<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FutRadar Real-Time</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        :root {
            --verde-neon: #00ff66;
            --dourado: #ffd700;
            --bg-escuro: #050505;
            --vidro: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-escuro);
            color: white;
            margin: 0; padding: 0;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        .header {
            background: linear-gradient(135deg, #0b3d1b, #000);
            padding: 25px; text-align: center; font-size: 24px; font-weight: 900;
            border-bottom: 3px solid var(--verde-neon);
            text-transform: uppercase; letter-spacing: 3px;
            box-shadow: 0 5px 20px rgba(0,255,102,0.3);
        }

        .section { display: none; padding: 20px; animation: fadeIn 0.4s ease-out; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* CARDS ESTILO VIDRO */
        .card {
            background: var(--vidro);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 20px; margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* NOTÍCIAS REAIS */
        #news-container { font-size: 14px; }
        .news-item { border-bottom: 1px solid rgba(255,255,255,0.1); padding: 15px 0; }
        .news-item:last-child { border: none; }
        .news-tag { color: var(--verde-neon); font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .news-title { font-weight: 700; margin-top: 5px; display: block; text-decoration: none; color: white; }

        /* PLACARES */
        .live-tag { background: #ff003c; padding: 4px 10px; border-radius: 10px; font-size: 12px; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.6; } }

        /* CONFETES LIBERTADORES */
        .confetti { position: absolute; width: 8px; height: 15px; background: var(--dourado); animation: fall 3s linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); } }

        /* MENU INFERIOR */
        .nav {
            position: fixed; bottom: 0; width: 100%; max-width: 500px;
            display: flex; justify-content: space-around; background: rgba(0,0,0,0.9);
            padding: 15px 0; border-top: 1px solid var(--verde-neon);
        }
        .nav-item { color: #666; font-size: 10px; text-align: center; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--verde-neon); transform: translateY(-5px); }
        .nav-icon { font-size: 20px; display: block; }
    </style>
</head>
<body>

<div class="header">⚽ FUTRADAR LIVE</div>

<div id="tab-news" class="section active">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h2 style="margin:0">Últimas Notícias</h2>
        <span style="font-size:10px; color:var(--verde-neon)">● AO VIVO</span>
    </div>
    <div id="news-loader" class="card">Carregando notícias do GE...</div>
    <div id="news-container"></div>
</div>

<div id="tab-jogos" class="section">
    <h2>Jogos de Hoje</h2>
    <div class="card">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <span class="live-tag">ENCERRADO</span>
            <span style="font-size:12px; color:#aaa;">Brasileirão</span>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; font-size:20px; font-weight:900;">
            <span>CORINTHIANS</span>
            <span style="color:var(--verde-neon); font-size:30px;">1 - 0</span>
            <span>VITÓRIA</span>
        </div>
    </div>
</div>

<div id="tab-copa" class="section" style="background: radial-gradient(circle, #222, #000); min-height: 70vh;">
    <h2 style="color:var(--dourado); text-align:center;">🏆 GLÓRIA ETERNA</h2>
    <div class="card" style="border-color:var(--dourado);">
        <p style="text-align:center; color:var(--dourado);">PRÓXIMA RODADA</p>
        <div style="display:flex; justify-content:space-around; align-items:center; font-weight:900;">
            <span>PALMEIRAS</span>
            <span style="color:var(--dourado)">VS</span>
            <span>RIVER PLATE</span>
        </div>
    </div>
</div>

<div class="nav">
    <div class="nav-item active" onclick="showTab('news', this)">
        <span class="nav-icon">📰</span>NOTÍCIAS
    </div>
    <div class="nav-item" onclick="showTab('jogos', this)">
        <span class="nav-icon">🏟️</span>JOGOS
    </div>
    <div class="nav-item" onclick="showTab('copa', this)">
        <span class="nav-icon">🏆</span>COPAS
    </div>
</div>

<script>
    // 1. BUSCAR NOTÍCIAS REAIS DO GLOBO ESPORTE
    async function fetchNews() {
        const container = document.getElementById('news-container');
        const loader = document.getElementById('news-loader');
        
        try {
            // Usando uma API gratuita que converte o RSS do GE para JSON
            const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://ge.globo.com/rss/futebol/');
            const data = await res.json();
            
            loader.style.display = 'none';
            container.innerHTML = '';

            data.items.slice(0, 8).forEach(item => {
                const div = document.createElement('div');
                div.className = 'card news-item';
                div.innerHTML = `
                    <span class="news-tag">URGENTE</span>
                    <a href="${item.link}" target="_blank" class="news-title">${item.title}</a>
                `;
                container.appendChild(div);
            });
        } catch (e) {
            loader.innerText = 'Erro ao carregar notícias. Tente novamente.';
        }
    }

    // 2. TROCAR ABAS E EFEITOS
    function showTab(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        el.classList.add('active');

        if(id === 'copa') startConfetti();
    }

    // 3. EFEITO DE CONFETE DOURADO
    function startConfetti() {
        const tab = document.getElementById('tab-copa');
        for(let i=0; i<30; i++) {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = Math.random() * 100 + 'vw';
            c.style.animationDelay = Math.random() * 2 + 's';
            c.style.backgroundColor = i % 2 === 0 ? '#ffd700' : '#fff';
            tab.appendChild(c);
            setTimeout(() => c.remove(), 3000);
        }
    }

    // Iniciar
    fetchNews();
    setInterval(fetchNews, 60000); // Atualiza notícias a cada 1 minuto
</script>

</body>
</html>
